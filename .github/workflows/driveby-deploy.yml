name: DriveBy Deploy
on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to deploy from'
        required: true
        default: 'main'
        type: string
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - staging
      image_tag:
        description: 'Container image tag to deploy'
        required: true
        default: 'latest'
        type: string
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
          fetch-depth: 0
      - name: Deploy to environment
        run: |
          ENV_BRANCH="environment/${{ inputs.environment }}-next"
          git config user.name "driveby-bot"
          git config user.email "driveby-bot@users.noreply.github.com"
          # Fetch the env-next branch (create orphan if first deploy)
          if git fetch origin "$ENV_BRANCH" 2>/dev/null; then
            git checkout "$ENV_BRANCH"
          else
            git checkout --orphan "$ENV_BRANCH"
            git rm -rf . 2>/dev/null || true
          fi
          # Clean — env branches contain ONLY manifests
          git rm -rf . 2>/dev/null || true
          # Copy manifests from source branch, flatten to branch root
          git checkout ${{ inputs.source_branch }} -- manifests/
          mv manifests/* . 2>/dev/null || true
          rm -rf manifests/
          # Stamp image tag
          sed -i "s|image: .*|image: ghcr.io/novelcore/broken-api:${{ inputs.image_tag }}|" deployment.yaml
          git add -A
          git diff --cached --quiet || git commit -m "deploy: ${{ inputs.source_branch }} → ${{ inputs.environment }} (broken-api:${{ inputs.image_tag }})"
          git push origin "$ENV_BRANCH"
