name: Build and Deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - 'manifests/**'
      - '.github/workflows/driveby-*'
permissions:
  contents: write
  packages: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/novelcore/broken-api:${{ github.sha }}
            ghcr.io/novelcore/broken-api:latest
      - name: Update manifests
        run: |
          sed -i "s|image: ghcr.io/novelcore/broken-api:.*|image: ghcr.io/novelcore/broken-api:${{ github.sha }}|" manifests/deployment.yaml
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add manifests/
          git diff --cached --quiet || git commit -m "ci: update image to ${{ github.sha }}"
          git push
